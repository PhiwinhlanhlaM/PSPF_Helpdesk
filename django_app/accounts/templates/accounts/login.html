{% extends "base.html" %}
{% block title %}Sign in — PSPF Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card mt-5">
      <div class="card-body p-4">
        <h4 class="mb-3 text-center">PSPF Helpdesk</h4>
        <p class="text-muted text-center small mb-4">Sign in to continue</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username or email</label>
            <input type="text" name="username" class="form-control" value="{{ form.username.value|default:'' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Sign in</button>
        </form>
        <p class="text-center mt-3 mb-0 small">
          No account? <a href="{% url 'accounts:register' %}">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
