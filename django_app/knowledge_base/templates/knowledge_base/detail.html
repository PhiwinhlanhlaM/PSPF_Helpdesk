{% extends "base.html" %}
{% block title %}{{ article.title }} — PSPF Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <a href="{% url 'knowledge_base:list' %}" class="text-muted small">&larr; Back to Knowledge Base</a>
    <div class="card mt-2">
      <div class="card-body p-4">
        {% if article.category %}<span class="badge bg-light text-dark mb-2">{{ article.category }}</span>{% endif %}
        <h3>{{ article.title }}</h3>
        <p class="text-muted small">Updated {{ article.updated_at|date:"Y-m-d" }}</p>
        <hr>
        <div style="white-space:pre-wrap">{{ article.body }}</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
