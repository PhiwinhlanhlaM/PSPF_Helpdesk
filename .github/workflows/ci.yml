name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, zip, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Check syntax on all PHP files
        run: |
          echo "Checking PHP syntax..."
          ERRORS=0
          while IFS= read -r -d '' file; do
            result=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              echo "::error file=$file::$result"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./PHPMailer-master/*" \
            -print0)
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS file(s) have syntax errors. Fix them before deploying."
            exit 1
          fi
          echo "✅ All PHP files passed syntax check."
